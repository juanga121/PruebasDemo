name: SonarCloud

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0

      - name: Install SonarScanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Restore
        run: dotnet restore

      - name: Sonar Begin
        run: |
          dotnet sonarscanner begin \
          /k:"juanga121_PruebasDemo" \
          /o:"juanga121" \
          /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
          /d:sonar.cs.cobertura.reportsPaths="**/PruebaDemoTest/TestResults/*/coverage.cobertura.xml" \
          /d:sonar.exclusions="**/node_modules/**,**/bin/**,**/obj/**"

      - name: Build
        run: dotnet build --no-restore

      - name: Test + Coverage
        run: dotnet test --collect:"XPlat Code Coverage"

      - name: Ver coverage generado
        run: find . -name "coverage.cobertura.xml"

      - name: Sonar End
        run: dotnet sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"